services:
  - type: web
    name: ucombini-chatbot
    runtime: node
    plan: free
    region: singapore
    buildCommand: npm install
    startCommand: node webhook-server.js
    envVars:
      - key: FACEBOOK_PAGE_TOKEN
        sync: false
      - key: FACEBOOK_VERIFY_TOKEN
        value: ucombini_verify_2026_secure
      - key: PORT
        value: 10000
    healthCheckPath: /health
